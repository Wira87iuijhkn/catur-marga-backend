version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: catur-marga-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: catur-marga-lms
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    container_name: catur-marga-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/catur-marga-lms
      JWT_SECRET: dev-secret-key-change-in-production
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
